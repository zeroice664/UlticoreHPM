name: Build Ulticore HPM APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Java 17 is needed for both Gradle 7.x and modern Android SDK tools
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Download Gradle 7.4 — first version with full Java 17 support
      - name: Install Gradle 7.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.4-bin.zip
          unzip -q gradle-7.4-bin.zip
          echo "$(pwd)/gradle-7.4/bin" >> $GITHUB_PATH

      # Install Android 28 platform and build tools, accept all licenses
      - name: Install Android SDK components
        run: |
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-28" "build-tools;28.0.3" || true
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            --licenses || true
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties

      # Compile all Java source files and package into a debug APK
      - name: Build APK
        run: gradle assembleDebug --stacktrace
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ulticore-HPM-v2.0-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 90
          
