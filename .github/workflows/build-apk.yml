name: Build Ulticore HPM APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 6.7.1 directly
        run: |
          wget -q https://services.gradle.org/distributions/gradle-6.7.1-bin.zip
          unzip -q gradle-6.7.1-bin.zip
          echo "$(pwd)/gradle-6.7.1/bin" >> $GITHUB_PATH

      - name: Install Android SDK components
        run: |
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-28" "build-tools;28.0.3" || true
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            --licenses || true
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties

      - name: Build APK
        run: gradle assembleDebug --stacktrace
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ulticore-HPM-v2.0-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 90
          
