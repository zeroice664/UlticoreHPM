# ═══════════════════════════════════════════════════════════════
#  ULTICORE HPM v2.0 — GitHub Actions Automated APK Builder
#  FIXED VERSION — Uses GitHub pre-installed Android SDK
#  Java 17 required for modern Android SDK tools
# ═══════════════════════════════════════════════════════════════

name: Build Ulticore HPM APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configure Android SDK path
        run: |
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV

      - name: Install required Android SDK components
        run: |
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            --sdk_root=/usr/local/lib/android/sdk \
            "platform-tools" \
            "platforms;android-28" \
            "build-tools;28.0.3" || true
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            --sdk_root=/usr/local/lib/android/sdk \
            --licenses || true

      - name: Create local.properties
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Rename APK
        run: |
          mkdir -p output
          cp app/build/outputs/apk/debug/*.apk \
             output/com.ulticore.highperformancemode-2.0.apk
          ls -lh output/

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ulticore-HPM-v2.0-APK
          path: output/com.ulticore.highperformancemode-2.0.apk
          retention-days: 90
