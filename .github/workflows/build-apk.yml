# ═══════════════════════════════════════════════════════════════
#  ULTICORE HPM v2.0 — GitHub Actions Automated APK Builder
#
#  How this works:
#  When you push (upload) code to GitHub, this file tells GitHub's
#  servers to automatically:
#    1. Spin up a fresh Ubuntu Linux machine
#    2. Install the Android SDK (build tools, platform SDK 28)
#    3. Compile all the Java source files
#    4. Package everything into a signed debug APK
#    5. Upload the APK as a downloadable "Artifact"
#
#  You then just visit the "Actions" tab on GitHub and download it.
# ═══════════════════════════════════════════════════════════════

name: Build Ulticore HPM APK

# ── TRIGGER: Run this workflow automatically whenever you push
#    any file to the 'main' branch. You can also trigger it
#    manually from the GitHub website using the button that
#    appears under Actions → "Run workflow".
on:
  push:
    branches:
      - main
  workflow_dispatch:   # ← This adds a manual "Run workflow" button on GitHub

jobs:
  build:
    # GitHub provides Ubuntu servers with Android SDK pre-installed
    runs-on: ubuntu-latest

    steps:

      # ── STEP 1: Download your code onto the build server ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── STEP 2: Install Java 11 (required to run Gradle & Android tools) ──
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'   # Eclipse Temurin is a trusted free JDK

      # ── STEP 3: Install the Android SDK Command-Line Tools ──
      #    This sets up the exact same tools Android Studio uses internally.
      #    sdkmanager downloads: build-tools 28.0.3 + platform android-28
      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      # ── STEP 4: Accept all Android SDK licenses (required by Google) ──
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      # ── STEP 5: Download exactly the SDK components we need ──
      #    platform-tools: adb, fastboot
      #    platforms;android-28: the Android 9 (Pie) class library
      #    build-tools;28.0.3: aapt, dx, apksigner, zipalign
      - name: Install required SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-28" \
            "build-tools;28.0.3"

      # ── STEP 6: Make the Gradle build script executable ──
      #    On Linux/Mac, scripts need execute permission before they can run.
      #    gradlew is the "Gradle Wrapper" — a self-contained build launcher
      #    that downloads the correct Gradle version automatically.
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── STEP 7: Build the debug APK ──
      #    assembleDebug compiles all Java, processes all resources,
      #    and packages everything into a single .apk file.
      #    The debug variant is fully installable — the only difference
      #    from a release build is it includes debug symbols.
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          # Point the build tools at the Android SDK we just installed
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      # ── STEP 8: Rename the APK to something clear and easy to find ──
      - name: Rename APK for clarity
        run: |
          mkdir -p output
          cp app/build/outputs/apk/debug/*.apk \
             output/com.ulticore.highperformancemode-2.0.apk

      # ── STEP 9: Upload the APK as a downloadable Artifact ──
      #    After this step, a "Download" button will appear on the
      #    GitHub Actions summary page. The APK stays available
      #    for 90 days. You just click and save to your phone.
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ulticore-HPM-v2.0-APK
          path: output/com.ulticore.highperformancemode-2.0.apk
          retention-days: 90   # Available for download for 90 days

      # ── STEP 10 (Bonus): Print the APK file size so you can confirm it built ──
      - name: Show APK info
        run: |
          echo "✅ Build complete!"
          ls -lh output/
          echo "SHA256 checksum:"
          sha256sum output/com.ulticore.highperformancemode-2.0.apk
